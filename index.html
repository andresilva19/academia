<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia PowerFit</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
scroll-behavior:smooth;
}

body{
color:white;
}

/* SEÇÕES */
section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* FUNDO */
#home{
background:url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
}
#planos{
background:url("https://images.unsplash.com/photo-1517963879433-6ad2b056d712?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
}
#agendamento{
background:url("https://images.unsplash.com/photo-1554284126-aa88f22d8b74?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
}

.overlay{
background:rgba(0,0,0,0.7);
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
}

/* TÍTULOS */
h1{
font-size:50px;
margin-bottom:10px;
}
h2{
font-size:35px;
margin-bottom:20px;
}

/* BOTÕES */
.btn{
padding:12px 25px;
background:#00ff88;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:15px;
border-radius:8px;
transition:0.3s;
}
.btn:hover{
background:#00cc6a;
}

/* PLANOS */
.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
width:250px;
backdrop-filter:blur(10px);
}

.card h3{
margin-bottom:10px;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:10px;
width:300px;
}

input, select{
padding:10px;
border:none;
border-radius:5px;
}

/* WHATSAPP FLOAT */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
color:white;
}
</style>
</head>

<body>

<!-- 1ª SEÇÃO -->
<section id="home">
<div class="overlay">
<h1>POWERFIT ACADEMIA</h1>
<p>Transforme seu corpo. Transforme sua vida.</p>
<a href="#planos"><button class="btn">Ver Planos</button></a>
</div>
</section>

<!-- 2ª SEÇÃO -->
<section id="planos">
<div class="overlay">
<h2>Planos de Treino</h2>

<div class="cards">
<div class="card">
<h3>Básico</h3>
<p>R$ 79,90</p>
<p>Musculação</p>
</div>

<div class="card">
<h3>Intermediário</h3>
<p>R$ 119,90</p>
<p>Musculação + Cardio</p>
</div>

<div class="card">
<h3>Premium</h3>
<p>R$ 159,90</p>
<p>Todos os treinos + Personal</p>
</div>
</div>

<a href="#agendamento"><button class="btn">Agendar Aula</button></a>
</div>
</section>

<!-- 3ª SEÇÃO -->
<section id="agendamento">
<div class="overlay">
<h2>Agendamento de Treino</h2>

<form id="form">

<input type="text" id="nome" placeholder="Seu nome" required>

<select id="dia">
<option>Escolha o dia da semana</option>
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
<option>Sábado</option>
</select>

<input type="date" id="data" required>

<select id="professor">
<option>Escolha o professor</option>
<option>João</option>
<option>Marcos</option>
<option>Lucas</option>
</select>

<select id="treino">
<option>Tipo de treino</option>
<option>Musculação</option>
<option>Funcional</option>
<option>Cardio</option>
<option>Cross Training</option>
</select>

<button type="submit" class="btn">Enviar para WhatsApp</button>

</form>
</div>
</section>

<!-- BOTÃO WHATSAPP -->
<a class="whatsapp" href="#" id="zap">📲</a>

<script>
document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let nome = document.getElementById("nome").value;
let dia = document.getElementById("dia").value;
let data = document.getElementById("data").value;
let professor = document.getElementById("professor").value;
let treino = document.getElementById("treino").value;

/* TROQUE O NÚMERO ABAIXO PELO DA SUA ACADEMIA */
let telefone = "5511999999999";

let msg =
`Olá! Novo agendamento:%0A
Nome: ${nome}%0A
Dia: ${dia}%0A
Data: ${data}%0A
Professor: ${professor}%0A
Treino: ${treino}`;

let url = `https://wa.me/${telefone}?text=${msg}`;

window.open(url, "_blank");
});
</script>

</body>
</html>
